<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 我们的小宇宙</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC";
    background: linear-gradient(135deg, #ffd6e7, #ffeef5);
    text-align: center;
}

.hidden {
    display: none;
}

.container {
    padding: 20px;
    max-width: 500px;
    margin: auto;
}

.card {
    background: white;
    margin: 20px 0;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(255, 105, 135, 0.2);
}

h1 {
    color: #ff4f81;
}

h3 {
    color: #ff4f81;
}

.button {
    background: #ff7aa2;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 30px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

.button:hover {
    background: #ff4f81;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-top: 10px;
    box-sizing: border-box;
}

.footer {
    margin: 40px 0;
    font-size: 13px;
    color: #999;
}
</style>
</head>

<body>

<!-- 🔐 登录页 -->
<div id="loginPage" class="container">
    <h1>💖 专属入口 💖</h1>
    <div class="card">
        <p>请输入你们的专属密码</p>
        <input type="password" id="passwordInput" placeholder="输入密码">
        <button class="button" onclick="checkPassword()">进入我们的小宇宙</button>
    </div>
</div>

<!-- 💗 主页面 -->
<div id="mainPage" class="hidden">

<div class="container">

<h1>💗 我们的小宇宙 💗</h1>

<div class="card">
    💖 心动值：<span id="currency">0</span><br>
    🏆 当前等级：<span id="level">青铜男友</span>
</div>

<div class="card">
    <h3>🌸 甜蜜任务</h3>
    <button class="button" onclick="completeTask()">完成一次贴贴 +100</button>
</div>

<div class="card">
    <h3>🎁 兑换区</h3>
    <button class="button" onclick="buyItem('电影约会',500)">电影约会 -500</button>
    <button class="button" onclick="buyItem('旅行计划',2000)">旅行计划 -2000</button>
</div>

<div class="card">
    <h3>💌 恋爱日记</h3>
    <textarea id="diaryInput" rows="3" placeholder="写下今天的甜甜瞬间..."></textarea>
    <button class="button" onclick="addDiary()">保存日记</button>
    <div id="diaryList"></div>
</div>

</div>

<div class="footer">made with ❤️ only for you</div>
</div>

<script>

// 🔐 你可以改成你们的专属密码
const correctPassword = "5201314";

let currency = localStorage.getItem("currency") ? parseInt(localStorage.getItem("currency")) : 0;
let diaries = localStorage.getItem("diaries") ? JSON.parse(localStorage.getItem("diaries")) : [];

// 登录检查
function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === correctPassword) {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
        updateUI();
    } else {
        alert("密码不对哦 💔");
    }
}

// 更新界面
function updateUI() {
    document.getElementById("currency").innerText = currency;
    document.getElementById("level").innerText = getLevel();
    renderDiaries();
    localStorage.setItem("currency", currency);
}

// 等级系统
function getLevel() {
    if (currency >= 5000) return "👑 王者男友";
    if (currency >= 3000) return "💎 星耀男友";
    if (currency >= 1500) return "🥇 黄金男友";
    if (currency >= 500) return "🥈 白银男友";
    return "🥉 青铜男友";
}

// 完成任务
function completeTask() {
    currency += 100;
    updateUI();
}

// 购买
function buyItem(name, price) {
    if (currency >= price) {
        currency -= price;
        alert("成功兑换：" + name + " 💕");
        updateUI();
    } else {
        alert("心动值不够哦 💗");
    }
}

// 添加日记
function addDiary() {
    const text = document.getElementById("diaryInput").value;
    if (!text) return;

    diaries.unshift(text);
    localStorage.setItem("diaries", JSON.stringify(diaries));
    document.getElementById("diaryInput").value = "";
    renderDiaries();
}

// 渲染日记
function renderDiaries() {
    const list = document.getElementById("diaryList");
    list.innerHTML = "";
    diaries.forEach(d => {
        const p = document.createElement("p");
        p.innerText = "💗 " + d;
        list.appendChild(p);
    });
}

</script>

</body>
</html>
