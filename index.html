<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Noto Serif SC',serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* 背景 */
body.birthday{
background:linear-gradient(135deg,#2b1d1d,#000);
}

/* 标题 */
.header{
text-align:center;
margin-top:60px;
}

.header h1{
font-family:'Playfair Display',serif;
font-size:42px;
color:#ffd8a8;
letter-spacing:2px;
}

.age{
margin-top:10px;
font-size:18px;
opacity:0.8;
}

/* 祝福弹窗 */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.8s;
}

.modal.show{
opacity:1;
pointer-events:auto;
}

.modal-content{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
max-width:600px;
line-height:1.8;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.close{
margin-top:20px;
text-align:right;
cursor:pointer;
color:#ffd8a8;
}

/* 玫瑰 */
.rose{
position:fixed;
top:-50px;
font-size:20px;
animation:fall linear infinite;
opacity:0.8;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* 烟花 */
.firework{
position:fixed;
width:6px;
height:6px;
background:#ffd8a8;
border-radius:50%;
pointer-events:none;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}
</style>
</head>

<body>

<div class="header">
<h1>Happy Birthday My Love 🎂</h1>
<div class="age">31 岁 · 2026.03.03</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<p>波折就像是生活的褶皱，藏着爱与成长的秘密，让我长大不少。</p>
<br>
<p>站在新起点，我愿以全身心的爱护你，和小狗陪你走过岁岁年年。</p>
<br>
<p>真实很庆幸这一路有你。</p>

<div class="close" onclick="closeModal()">关闭</div>
</div>
</div>

<script>

/* 判断生日 */
const today=new Date();
if(today.getFullYear()==2026 && today.getMonth()==2 && today.getDate()==3){
document.body.classList.add("birthday");
setTimeout(()=>{document.getElementById("modal").classList.add("show");},1500);
createRoses();
}

/* 关闭弹窗 */
function closeModal(){
document.getElementById("modal").classList.remove("show");
}

/* 玫瑰飘落 */
function createRoses(){
for(let i=0;i<20;i++){
let rose=document.createElement("div");
rose.className="rose";
rose.innerText="🌹";
rose.style.left=Math.random()*100+"vw";
rose.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(rose);
}
}

/* 点击烟花 */
document.addEventListener("click",function(e){
for(let i=0;i<18;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=e.clientX+"px";
f.style.top=e.clientY+"px";
let angle=Math.random()*2*Math.PI;
let radius=60+Math.random()*40;
f.style.setProperty("--x",Math.cos(angle)*radius+"px");
f.style.setProperty("--y",Math.sin(angle)*radius+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
});

</script>

</body>
</html>
