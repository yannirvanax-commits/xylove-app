<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XY 恋爱宇宙 💖</title>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'ZCOOL XiaoWei',serif;}
body{
height:100vh;
overflow:hidden;
color:white;
}

.background{
position:fixed;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(8px) brightness(0.6);
transition:1s;
z-index:-1;
}

.container{
text-align:center;
padding:30px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

.score{
font-size:28px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
margin:20px auto;
border-radius:20px;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button{
margin:8px;
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff6fa5;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff3f8e;
transform:scale(1.05);
}

.menu{
margin-bottom:20px;
}

audio{
display:none;
}
</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="container">

<h1>XY 恋爱宇宙 💕</h1>
<div class="score">当前甜蜜值：<span id="score">0</span></div>

<div class="card">
<h2>甜蜜任务 🌸</h2>
<button onclick="add(100)">🧹 家务 +100</button>
<button onclick="add(300)">🛍 逛街 +300</button>
<button onclick="add(100)">🐶 遛狗 +100</button>
<button onclick="add(500)">🍳 做饭 +500</button>
<button onclick="add(500)">💞 啪啪啪 +500</button>
</div>

<div class="card">
<h2>兑换区 💎</h2>
<button onclick="minus(1000)">😤 停止生气 -1000</button>
<button onclick="minus(2000)">🏠 回家住一天 -2000</button>
</div>

</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
let score = localStorage.getItem("loveScore") || 0;
document.getElementById("score").innerText = score;

function add(num){
score = parseInt(score) + num;
update();
}

function minus(num){
score = parseInt(score) - num;
if(score < 0) score = 0;
update();
}

function update(){
document.getElementById("score").innerText = score;
localStorage.setItem("loveScore",score);
}

const images = ["bg1.jpg","bg2.jpg","bg3.jpg","bg4.jpg"];
let index = 0;

function changeBg(){
document.getElementById("bg").style.backgroundImage = `url(${images[index]})`;
index = (index + 1) % images.length;
}

changeBg();
setInterval(changeBg,5000);
</script>

</body>
</html>
