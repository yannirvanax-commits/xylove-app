<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XY · Love System</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Noto Serif SC',serif;
background:linear-gradient(135deg,#1a1a1a,#2b1d1d,#1a1a1a);
color:#fff;
overflow-x:hidden;
}

/* 背景柔光 */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 30%,rgba(255,200,180,0.15),transparent),
radial-gradient(circle at 80% 70%,rgba(255,220,180,0.12),transparent);
z-index:-1;
}

/* 容器 */
.container{
max-width:1000px;
margin:auto;
padding:50px 20px;
}

h1{
font-family:'Playfair Display',serif;
font-size:42px;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:0.8;
margin-bottom:30px;
}

.quote{
text-align:center;
color:#ffd8a8;
margin-bottom:40px;
font-size:18px;
}

/* 卡片 */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:30px;
margin:30px 0;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* 菜单按钮 */
.menu button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#f6c1a5,#e89cae);
color:white;
cursor:pointer;
}

/* 兑换按钮 */
.redeem button{
background:linear-gradient(135deg,#ffd8a8,#e8b89c);
color:#000;
}

/* 时间线 */
.story{
margin-top:60px;
}

.story-section{
min-height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
opacity:0;
transform:translateY(40px);
transition:1s;
margin-bottom:60px;
}

.story-section.show{
opacity:1;
transform:translateY(0);
}

.story-section h3{
color:#ffd8a8;
margin-bottom:15px;
}
</style>
</head>

<body>

<audio id="bgMusic" src="main.mp3" loop></audio>

<div class="container">

<h1>XY · Love Story</h1>
<div class="subtitle">Our Sweet Universe</div>

<div class="quote" id="dailyQuote"></div>

<div class="card">
<h2>甜蜜值：<span id="score">0</span></h2>
</div>

<div class="card menu">
<h2>甜蜜任务</h2>
<button onclick="add(100,'house')">家务 +100</button>
<button onclick="add(300,'shop')">逛街 +300</button>
<button onclick="add(100,'dog')">遛狗 +100</button>
<button onclick="add(500,'cook')">做饭 +500</button>
<button onclick="add(500,'love')">啪啪啪 +500</button>
</div>

<div class="card redeem">
<h2>兑换区</h2>
<button onclick="redeem(1000)">停止生气 -1000</button>
<button onclick="redeem(2000)">回家住一天 -2000</button>
</div>

<div class="card">
<h2>恋爱成就</h2>
<div id="achievements"></div>
</div>

<div class="story">
<div class="story-section">
<h3>初遇</h3>
<p>那一天，我们的故事开始</p>
</div>

<div class="story-section">
<h3>第一次旅行</h3>
<p>一起看风景的日子永远值得纪念</p>
</div>

<div class="story-section">
<h3>未来</h3>
<p>未来的每一天都想与你并肩</p>
</div>
</div>

</div>

<script>

/* 音乐激活 */
document.addEventListener("click",()=>{
document.getElementById("bgMusic").play();
},{once:true});

/* 积分 */
let score=localStorage.getItem("loveScore")||0;
document.getElementById("score").innerText=score;

let stats=JSON.parse(localStorage.getItem("stats"))||{
house:0,shop:0,dog:0,cook:0,love:0,redeem:0
};

function add(points,type){
score=parseInt(score)+points;
stats[type]++;
update();
}

function redeem(points){
if(score>=points){
score-=points;
stats.redeem+=points;
update();
}else{
alert("甜蜜值不足");
}
}

function update(){
localStorage.setItem("loveScore",score);
localStorage.setItem("stats",JSON.stringify(stats));
document.getElementById("score").innerText=score;
checkAchievements();
}

/* 每日情话 */
const quotes=[
"今天也比昨天更爱你",
"和你在一起的时间都值得纪念",
"世界很大，但你是我的宇宙",
"余生很长，但我只想和你走"
];

const today=new Date().getDate()%quotes.length;
document.getElementById("dailyQuote").innerText="💌 "+quotes[today];

/* 成就 */
function checkAchievements(){
let list=[];
if(stats.cook>=10) list.push("🍳 米其林之爱");
if(score>=5000) list.push("💎 甜蜜大师");
if(stats.redeem>=5000) list.push("🌿 情绪管理专家");

let box=document.getElementById("achievements");
box.innerHTML="";
list.forEach(a=>{
box.innerHTML+=`<div>${a}</div>`;
});
}

checkAchievements();

/* 滚动动画 */
let sections=document.querySelectorAll(".story-section");
let observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});
sections.forEach(sec=>observer.observe(sec));

</script>

</body>
</html>
