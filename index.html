<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XY · Love Story</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Noto Serif SC',serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* 原页面 */
.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
font-family:'Playfair Display',serif;
font-size:38px;
text-align:center;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:25px;
margin:20px 0;
border-radius:20px;
}

button{
padding:8px 15px;
margin:6px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#f6c1a5,#e89cae);
color:white;
cursor:pointer;
}

/* ===== 生日覆盖层 ===== */

.birthday-layer{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#2b1d1d,#000);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
text-align:center;
padding:30px;
transition:1s;
}

.birthday-text{
font-size:22px;
max-width:650px;
line-height:1.8;
opacity:0;
transition:1s;
}

.birthday-text.show{
opacity:1;
}

.final-line{
margin-top:40px;
font-size:24px;
color:#ffd8a8;
opacity:0;
transition:2s;
letter-spacing:1px;
}

.final-line.show{
opacity:1;
}

.firework{
position:fixed;
width:6px;
height:6px;
background:#ffd8a8;
border-radius:50%;
pointer-events:none;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}
</style>
</head>

<body>

<!-- 原网页 -->
<div class="container">
<h1>XY · Love Story</h1>

<div class="card">
<h2>甜蜜任务</h2>
<button onclick="add(100)">家务 +100</button>
<button onclick="add(300)">逛街 +300</button>
<button onclick="add(500)">做饭 +500</button>
<div style="margin-top:10px;">甜蜜值：<span id="score">0</span></div>
</div>
</div>

<!-- 生日覆盖层 -->
<div class="birthday-layer" id="birthdayLayer" style="display:none;">
<div class="birthday-text" id="birthdayText"></div>
<div class="final-line" id="finalLine">
✨ 31 岁，欢迎来到更被爱的一年。 ✨
</div>
</div>

<script>

/* ===== 原积分系统 ===== */
let score=localStorage.getItem("loveScore")||0;
document.getElementById("score").innerText=score;

function add(n){
score=parseInt(score)+n;
localStorage.setItem("loveScore",score);
document.getElementById("score").innerText=score;
}

/* ===== 生日模式逻辑 ===== */

const birthdayDate="2026-03-03";
const today=new Date().toISOString().split("T")[0];

const messages=[
"波折就像是生活的褶皱，藏着爱与成长的秘密，让我长大不少。",
"站在新起点，我愿以全身心的爱护你，和小狗陪你走过岁岁年年。",
"真实很庆幸这一路有你。"
];

let currentIndex=0;

if(today===birthdayDate){
startBirthdayMode();
}

function startBirthdayMode(){
const layer=document.getElementById("birthdayLayer");
layer.style.display="flex";
showNextMessage();

layer.addEventListener("click",function(e){
if(currentIndex < messages.length){
createFirework(e.clientX,e.clientY);
currentIndex++;
if(currentIndex < messages.length){
setTimeout(showNextMessage,600);
}else{
setTimeout(showFinalLine,800);
}
}
});
}

function showNextMessage(){
const text=document.getElementById("birthdayText");
text.classList.remove("show");
setTimeout(()=>{
text.innerText=messages[currentIndex];
text.classList.add("show");
},300);
}

function showFinalLine(){
document.getElementById("birthdayText").classList.remove("show");
const final=document.getElementById("finalLine");
final.classList.add("show");
setTimeout(endBirthdayMode,2500);
}

function endBirthdayMode(){
const layer=document.getElementById("birthdayLayer");
layer.style.opacity="0";
setTimeout(()=>{
layer.style.display="none";
},1200);
}

/* 烟花 */
function createFirework(x,y){
for(let i=0;i<18;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=x+"px";
f.style.top=y+"px";
let angle=Math.random()*2*Math.PI;
let radius=60+Math.random()*40;
f.style.setProperty("--x",Math.cos(angle)*radius+"px");
f.style.setProperty("--y",Math.sin(angle)*radius+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

</script>

</body>
</html>
