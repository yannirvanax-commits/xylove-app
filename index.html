<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XY · Forever Love</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Noto Serif SC',serif;
color:#fff;
overflow-x:hidden;
}

/* 生日模式 */
#birthday{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#1c1c1c,#2b1d1d);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
transition:1s;
}

#birthdayText{
font-size:26px;
max-width:700px;
text-align:center;
line-height:1.8;
opacity:0;
transition:1s;
}

.hidden{opacity:0;pointer-events:none;}

/* 主页面 */
#mainPage{
background:url("bg.jpg") center/cover no-repeat fixed;
min-height:100vh;
padding:60px 20px;
display:none;
}

.overlay{
background:rgba(0,0,0,0.45);
min-height:100vh;
padding-bottom:100px;
}

h1{text-align:center;font-size:42px;margin-bottom:10px;}
.subtitle{text-align:center;margin-bottom:20px;}

.glass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
margin:30px auto;
border-radius:25px;
max-width:900px;
}

button{
background:#f4b6b6;
border:none;
padding:10px 20px;
border-radius:30px;
margin:8px;
cursor:pointer;
}

.score{
font-size:24px;
margin-bottom:20px;
}

/* 烟花 */
.firework{
position:fixed;
width:6px;
height:6px;
background:#fff;
border-radius:50%;
animation:boom 0.8s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(25);opacity:0;}
}
</style>
</head>

<body>

<!-- 生日模式 -->
<div id="birthday">
<div id="birthdayText"></div>
</div>

<!-- 主页面 -->
<div id="mainPage">
<div class="overlay">

<h1>XY · Forever Love</h1>
<div class="subtitle">To My One and Only 💍</div>

<div class="glass">
<div class="score">甜蜜值：<span id="score">0</span></div>

<h3>甜蜜任务</h3>
<button onclick="add(100)">家务 +100</button>
<button onclick="add(300)">逛街 +300</button>
<button onclick="add(100)">遛狗 +100</button>
<button onclick="add(500)">做饭 +500</button>
<button onclick="add(500)">甜蜜时光 +500</button>
</div>

<div class="glass">
<h3>兑换区</h3>
<button onclick="redeem(1000)">停止生气 -1000</button>
<button onclick="redeem(2000)">回家住一天 -2000</button>
</div>

</div>
</div>

<script>

/* ====== 生日模式逻辑 ====== */

const texts=[
"波折就像是生活的褶皱，藏着爱与成长的秘密，让我长大不少。",
"站在新起点，我愿以全身心的爱护你，和小狗陪你走过岁岁年年。",
"真实很庆幸这一路有你。"
];

let index=0;
const textBox=document.getElementById("birthdayText");

function showText(){
textBox.style.opacity=0;
setTimeout(()=>{
textBox.innerText=texts[index];
textBox.style.opacity=1;
},500);
}

showText();

document.getElementById("birthday").addEventListener("click",(e)=>{
createFirework(e.clientX,e.clientY);

if(index<texts.length-1){
index++;
setTimeout(showText,600);
}else{
endBirthday();
}
});

function createFirework(x,y){
let fw=document.createElement("div");
fw.className="firework";
fw.style.left=x+"px";
fw.style.top=y+"px";
document.body.appendChild(fw);
setTimeout(()=>fw.remove(),800);
}

function endBirthday(){
document.getElementById("birthday").style.opacity=0;
setTimeout(()=>{
document.getElementById("birthday").style.display="none";
document.getElementById("mainPage").style.display="block";
},1000);
}

/* ====== 积分系统 ====== */

let score=localStorage.getItem("loveScore")||0;
document.getElementById("score").innerText=score;

function add(num){
score=parseInt(score)+num;
localStorage.setItem("loveScore",score);
document.getElementById("score").innerText=score;
}

function redeem(num){
if(score>=num){
score-=num;
localStorage.setItem("loveScore",score);
document.getElementById("score").innerText=score;
}else{
alert("甜蜜值不足哦～");
}
}

</script>

</body>
</html>
