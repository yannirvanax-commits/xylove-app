<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XY · Love</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Noto Serif SC',serif;
color:#fff;
overflow:hidden;
}

/* 背景轮播 */
.bg{
position:fixed;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:2s ease;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* 玻璃卡片 */
.glass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:40px;
border-radius:30px;
max-width:800px;
margin:auto;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* 主页面 */
#main{
display:none;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

button{
background:rgba(255,255,255,0.85);
border:none;
padding:10px 20px;
border-radius:30px;
margin:5px;
cursor:pointer;
}

.score{
font-size:22px;
margin-bottom:20px;
}

/* ===== 生日黑色开场 ===== */
#birthday{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
transition:1s;
}

#birthdayText{
font-size:26px;
opacity:0;
transition:1s;
white-space:nowrap;
color:#fff;
}

/* 烟花 */
.firework{
position:fixed;
width:6px;
height:6px;
background:#fff;
border-radius:50%;
animation:boom 0.8s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(30);opacity:0;}
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<!-- 生日层 -->
<div id="birthday">
<div id="birthdayText"></div>
</div>

<!-- 主系统 -->
<div id="main">
<div class="glass">

<h1>XY · Forever</h1>

<div class="score">甜蜜值：<span id="score">0</span></div>

<h3>甜蜜任务</h3>
<button onclick="add(100)">家务 +100</button>
<button onclick="add(300)">逛街 +300</button>
<button onclick="add(100)">遛狗 +100</button>
<button onclick="add(500)">做饭 +500</button>
<button onclick="add(500)">甜蜜时光 +500</button>

<h3 style="margin-top:20px;">兑换区</h3>
<button onclick="redeem(1000)">停止生气 -1000</button>
<button onclick="redeem(2000)">回家住一天 -2000</button>

</div>
</div>

<script>

/* ===== 背景轮播 ===== */
const images=["bg1.jpg","bg2.jpg","bg3.jpg","bg4.jpg"];
let bgIndex=0;
const bg=document.getElementById("bg");

function changeBg(){
bg.style.backgroundImage=`url(${images[bgIndex]})`;
bgIndex=(bgIndex+1)%images.length;
}
changeBg();
setInterval(changeBg,6000);

/* ===== 生日逻辑 ===== */
const texts=[
"波折就像是生活的褶皱，藏着爱与成长的秘密，让我长大不少",
"站在新起点，我愿以全身心的爱护你，和小狗陪你走过岁岁年年",
"真实很庆幸这一路有你",
"✨ 31 岁，欢迎来到更被爱的一年 ✨"
];

let index=0;
const textBox=document.getElementById("birthdayText");

function showText(){
textBox.style.opacity=0;
setTimeout(()=>{
textBox.innerText=texts[index];
textBox.style.opacity=1;
},400);
}
showText();

document.getElementById("birthday").addEventListener("click",(e)=>{
createFirework(e.clientX,e.clientY);

if(index<texts.length-1){
index++;
setTimeout(showText,600);
}else{
endBirthday();
}
});

function createFirework(x,y){
let fw=document.createElement("div");
fw.className="firework";
fw.style.left=x+"px";
fw.style.top=y+"px";
document.body.appendChild(fw);
setTimeout(()=>fw.remove(),800);
}

function endBirthday(){
document.getElementById("birthday").style.opacity=0;
setTimeout(()=>{
document.getElementById("birthday").style.display="none";
document.getElementById("main").style.display="flex";
document.body.style.overflow="auto";
},1000);
}

/* ===== 积分系统 ===== */
let score=localStorage.getItem("loveScore")||0;
document.getElementById("score").innerText=score;

function add(num){
score=parseInt(score)+num;
localStorage.setItem("loveScore",score);
document.getElementById("score").innerText=score;
}

function redeem(num){
if(score>=num){
score-=num;
localStorage.setItem("loveScore",score);
document.getElementById("score").innerText=score;
}else{
alert("甜蜜值不足");
}
}

</script>

</body>
</html>
